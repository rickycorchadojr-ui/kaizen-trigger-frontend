<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trigger</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    background: #0d0d0d;
    font-family: "Courier New", monospace;
    color: #eee;
  }
  h1 {
    letter-spacing: 2px;
    font-size: 14px;
    color: #888;
    text-transform: uppercase;
  }
  .buttons {
    display: flex;
    gap: 20px;
  }
  button {
    width: 140px;
    height: 90px;
    font-size: 20px;
    font-weight: bold;
    font-family: inherit;
    letter-spacing: 1px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    color: #0d0d0d;
  }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  #buy { background: #4ade80; }
  #sell { background: #f87171; }
  #status {
    min-height: 20px;
    font-size: 13px;
    color: #aaa;
    text-align: center;
    max-width: 320px;
  }
  #chart {
    background: #161616;
    border: 1px solid #333;
    border-radius: 6px;
  }
  #chartStatus {
    font-size: 11px;
    color: #666;
    text-align: center;
  }
</style>
</head>
<body>

  <h1>MNQ Trigger</h1>

  <div class="buttons">
    <button id="buy">BUY</button>
    <button id="sell">SELL</button>
  </div>

  <div id="status"></div>

  <canvas id="chart" width="320" height="120"></canvas>
  <div id="chartStatus"></div>

<script>
  // -----------------------------------------------------------------
  // Fill these in after your backend is deployed on Render:
  const BACKEND_URL = "https://your-render-service.onrender.com/trade";
  const TRIGGER_SECRET = "your-trigger-secret-here";
  // -----------------------------------------------------------------

  const HEALTH_URL = BACKEND_URL.replace(/\/trade$/, "/health");
  const PRICES_URL = BACKEND_URL.replace(/\/trade$/, "/prices");
  const PING_INTERVAL_MS = 8 * 60 * 1000; // 8 min -- safely under Render's 15-min sleep threshold
  const PRICE_POLL_MS = 3 * 1000; // 3 sec -- feels live without hammering the server

  const buyBtn = document.getElementById("buy");
  const sellBtn = document.getElementById("sell");
  const status = document.getElementById("status");
  const chartStatus = document.getElementById("chartStatus");
  const canvas = document.getElementById("chart");
  const ctx = canvas.getContext("2d");

  // ---------------------------------------------------------------
  // Usage-driven keep-alive: instead of a scheduled ping running all
  // day whether you're here or not, THIS PAGE pings the backend every
  // few minutes for as long as it's open in an active tab. Close the
  // tab, switch tabs, or just don't open the page today, and zero
  // pings happen -- Render is free to let it sleep and you spend zero
  // instance-hours on days you're not trading.
  // ---------------------------------------------------------------
  let pingTimer = null;

  async function pingHealth() {
    try {
      await fetch(HEALTH_URL);
    } catch (err) {
      // Silent by design -- a failed background ping isn't worth
      // interrupting you with. If the backend is actually down,
      // you'll find out the moment you tap Buy or Sell.
    }
  }

  function startPinging() {
    if (pingTimer) return; // already running
    pingHealth(); // ping immediately so the page also wakes it on open
    pingTimer = setInterval(pingHealth, PING_INTERVAL_MS);
  }

  function stopPinging() {
    if (pingTimer) {
      clearInterval(pingTimer);
      pingTimer = null;
    }
  }

  // ---------------------------------------------------------------
  // Live chart: polls the backend's rolling price buffer every few
  // seconds and redraws a simple line. Same on/off-tab behavior as
  // the keep-alive ping -- only runs while you're actually looking.
  // ---------------------------------------------------------------
  let priceTimer = null;

  function drawChart(prices) {
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    if (!prices || prices.length < 2) return;

    const values = prices.map((p) => p.price);
    const min = Math.min(...values);
    const max = Math.max(...values);
    const range = max - min || 1;

    ctx.beginPath();
    prices.forEach((p, i) => {
      const x = (i / (prices.length - 1)) * (w - 10) + 5;
      const y = h - 10 - ((p.price - min) / range) * (h - 20);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.strokeStyle = "#4ade80";
    ctx.lineWidth = 1.5;
    ctx.stroke();

    chartStatus.textContent = `MNQ ${values[values.length - 1].toFixed(2)}`;
  }

  async function pollPrices() {
    try {
      const resp = await fetch(PRICES_URL);
      const data = await resp.json();
      if (resp.ok && data.prices) drawChart(data.prices);
    } catch (err) {
      // Silent -- the chart just won't update this tick. Buy/Sell are
      // unaffected either way since they don't depend on this feed.
    }
  }

  function startPricePolling() {
    if (priceTimer) return;
    pollPrices();
    priceTimer = setInterval(pollPrices, PRICE_POLL_MS);
  }

  function stopPricePolling() {
    if (priceTimer) {
      clearInterval(priceTimer);
      priceTimer = null;
    }
  }

  // Only ping/poll while this tab is the one you're actually looking at.
  // Leaving it open in the background all day (without looking at it)
  // shouldn't quietly cost instance-hours either.
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") {
      startPinging();
      startPricePolling();
    } else {
      stopPinging();
      stopPricePolling();
    }
  });

  if (document.visibilityState === "visible") {
    startPinging();
    startPricePolling();
  }

  async function trigger(side) {
    buyBtn.disabled = true;
    sellBtn.disabled = true;
    status.textContent = `Placing ${side.toUpperCase()}...`;

    try {
      const resp = await fetch(BACKEND_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ side, secret: TRIGGER_SECRET }),
      });
      const data = await resp.json();

      if (!resp.ok) {
        status.textContent = `Error: ${data.error || "unknown error"}`;
      } else {
        status.textContent =
          `${side.toUpperCase()} placed on ${data.contract}. ` +
          `orderId=${data.orderId} (stop ${data.stopTicks}t / target ${data.targetTicks}t)`;
      }
    } catch (err) {
      status.textContent = `Network error: ${err.message}`;
    } finally {
      buyBtn.disabled = false;
      sellBtn.disabled = false;
    }
  }

  buyBtn.addEventListener("click", () => trigger("buy"));
  sellBtn.addEventListener("click", () => trigger("sell"));
</script>

</body>
</html>
